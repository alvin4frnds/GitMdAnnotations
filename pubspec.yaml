name: gitmdannotations_tablet
description: "Pen-driven spec review, synced to git."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.5

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5
  # Markdown rendering for SpecReaderMd (IMPLEMENTATION.md §4.4).
  # Consumed only from `lib/ui/screens/spec_reader_md/`; domain/app
  # layers operate on the raw string loaded via SpecRepository.loadSpec.
  flutter_markdown: ^0.7.4
  # Storage Access Framework (W5.2 Export backups). Lets the user pick a
  # SAF destination folder; we then copy the on-device backup tree there.
  shared_storage: ^0.8.1
  # Fork that adds an Android Flutter plugin source set and ships the
  # NDK-built `libgit2.so` + `libmbedtls.so` family under
  # `android/src/main/jniLibs/<abi>/` for arm64-v8a, armeabi-v7a, x86_64.
  # Published `libgit2dart ^1.2.2` is discontinued and has no Android
  # support. See docs/Issues.md — "libgit2dart has no Android plugin".
  # `ref` is pinned to a SHA (not `main`) so `flutter pub get` is
  # reproducible — bump it explicitly when rolling the fork forward.
  libgit2dart:
    git:
      url: git@github.com:alvin4frnds/libgit2dart-fork.git
      ref: f68760e
  # PDF rasterization — IMPLEMENTATION.md §4.4 / D-12 fixes the renderer
  # as `pdfx` (MIT). Consumed only from `lib/infra/pdf/pdfx_adapter.dart`;
  # domain code talks to `PdfRasterPort`.
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

  # Generates Android launcher icon (legacy + adaptive) from the PNGs
  # produced by `python tool/gen_icon.py`. Run:
  #   dart run flutter_launcher_icons
  # whenever assets/icon/*.png change.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  assets:
    # 587-byte minimal 1-page PDF used by
    # `integration_test/pdf_raster_test.dart`. Shipped as an app asset so
    # `rootBundle.load` can hand the bytes to pdfx via `openData` on the
    # real device — the device filesystem has no access to the host's
    # `integration_test/fixtures/` directory during a
    # `flutter test integration_test/...` run.
    - integration_test/fixtures/hello.pdf
    # Mozilla's Trust Store (from https://curl.se/docs/caextract.html).
    # Our forked libgit2 is linked against mbedTLS 2.28 which does not
    # ship a CA bundle, and Android's system CA directory lives under
    # /system/etc/security/cacerts/ with hash-named files that mbedTLS'
    # cert-path parser can't consume. At bootstrap we copy this asset
    # to the app's cache dir and hand the path to libgit2 via
    # Libgit2.setSSLCertLocations — without this every HTTPS clone from
    # github.com fails with "certificate is not correctly signed by the
    # trusted CA".
    - assets/ca/cacert.pem

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Bundled typography — closes Issues.md:21-26 (M1a QA). Without these,
  # `fontFamily: 'monospace'` falls back to Roboto on Android, and the
  # header breadcrumb renders with squiggly-underline artifacts (visible
  # on every QA screencap to date). Inter v4.1 + JetBrains Mono 2.304.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.otf
        - asset: assets/fonts/Inter-Medium.otf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Inter-Bold.otf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
