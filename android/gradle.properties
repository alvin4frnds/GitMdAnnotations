org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Downgrade the Kotlin/Java JVM-target mismatch check to a warning so
# older Flutter plugins (shared_storage 0.8, pdfx, flutter_secure_storage)
# that ship with Java 1.8/11 compileOptions don't blow up against the
# host JDK 21 + Kotlin default-17 target. All classes end up on Android
# D8/R8's desugaring path anyway, so the skew is dev-ergonomics noise,
# not a runtime hazard.
kotlin.jvm.target.validation.mode=warning
